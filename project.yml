name: SaoTrack
options:
  bundleIdPrefix: com.saotrack
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  SaoTrack:
    type: application
    platform: macOS
    sources:
      - path: SaoTrack/Sources
      - path: SaoTrack/Resources
    entitlements:
      path: SaoTrack/SaoTrack.entitlements
      properties:
        # Sandbox must stay OFF: the app launches external processes
        # (demucs via python, yt-dlp, ffmpeg) from Homebrew/user paths,
        # which is impossible inside the App Sandbox.
        com.apple.security.app-sandbox: false
    info:
      path: SaoTrack/Info.plist
      properties:
        CFBundleDisplayName: SaoTrack
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.music
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saotrack.SaoTrack
        MARKETING_VERSION: "1.0.0"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
